spring.application.name=car-rental-service
spring.datasource.url=jdbc:mysql://localhost:3306/car_rental_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=gan
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

app.jwt.secret=jJ5FoLl+3O16ofIxXJyiidoKup6NRdfJc3g4vHXiBGw=
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000
# CORS configuration
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
# Actuator configurations
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.beans.enabled=true
management.endpoint.mappings.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=*

# Enable specific endpoints
management.endpoint.env.enabled=true
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.loggers.enabled=true

# Health check details
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.defaults.enabled=true

# Show all endpoints (including mappings)
management.endpoint.mappings.sensitive=false